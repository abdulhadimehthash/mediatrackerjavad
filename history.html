<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — Media Tracker</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav>
  <span class="nav-brand">MEDIA<span class="dot">.</span>TRACKER</span>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="log.html">Log Day</a>
    <a href="followers.html">Followers</a>
    <a href="history.html" class="active">History</a>
    <a href="report.html">Report</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>History<span class="cursor">_</span></h1>
    <p class="sub">All your logged work days</p>
  </div>

  <div class="filter-bar">
    <select id="month-filter" class="form-input filter-select" onchange="renderHistory()">
      <option value="">All Months</option>
    </select>
    <span class="log-count-label" id="count-label"></span>
  </div>

  <div class="history-list" id="history-list">
    <p class="empty-state">No logs found.</p>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="editLog()">Edit</button>
      <button class="btn-danger" onclick="deleteLog()">Delete</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  const platformNames = {
    caliph_ig: 'Caliph IG', kahani: 'Kahani', life_at_caliph: 'Life at Caliph',
    pen_club: 'Pen Club', ksf: 'KSF', yt_subs: 'YT Subs', yt_videos: 'YT Videos', shorts: 'Shorts'
  };

  let currentLogDate = null;
  let cachedLogs = [];

  async function populateMonthFilter() {
    const logs = await getLogs();
    cachedLogs = logs;
    const months = [...new Set(logs.map(l => l.date.slice(0, 7)))].sort().reverse();
    const sel = document.getElementById('month-filter');
    sel.innerHTML = '<option value="">All Months</option>';
    months.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      const [y, mo] = m.split('-');
      opt.textContent = new Date(y, mo - 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
      sel.appendChild(opt);
    });
    renderHistory();
  }

  function renderHistory() {
    const filter = document.getElementById('month-filter').value;
    const logs = cachedLogs.filter(l => !filter || l.date.startsWith(filter)).reverse();
    document.getElementById('count-label').textContent = `${logs.length} log${logs.length !== 1 ? 's' : ''}`;
    const list = document.getElementById('history-list');
    if (logs.length === 0) {
      list.innerHTML = '<p class="empty-state">No logs for this period.</p>';
      return;
    }
    list.innerHTML = '';
    logs.forEach(log => {
      const el = document.createElement('div');
      el.className = 'history-item';
      el.onclick = () => openModal(log.date);
      const taskCount = log.tasks ? log.tasks.filter(t => t.trim()).length : 0;
      el.innerHTML = `
        <div class="hi-left">
          <div class="hi-date">${new Date(log.date + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
          <div class="hi-preview">${log.tasks ? log.tasks.filter(t=>t.trim()).slice(0,2).join(' · ') : 'No tasks'}</div>
        </div>
        <div class="hi-right">
          <span class="tag">${taskCount} task${taskCount !== 1 ? 's' : ''}</span>
        </div>
      `;
      list.appendChild(el);
    });
  }

  function openModal(date) {
    currentLogDate = date;
    const log = cachedLogs.find(l => l.date === date);
    if (!log) return;
    const mc = document.getElementById('modal-content');
    mc.innerHTML = `
      <h2 class="modal-title">${new Date(date + 'T00:00:00').toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</h2>
      <div class="modal-section">
        <div class="modal-section-label">Tasks</div>
        ${log.tasks && log.tasks.filter(t=>t.trim()).length > 0
          ? log.tasks.filter(t=>t.trim()).map(t => `<div class="modal-task">— ${t}</div>`).join('')
          : '<div class="modal-task muted">No tasks logged</div>'}
      </div>
      ${log.notes ? `
      <div class="modal-section">
        <div class="modal-section-label">Notes</div>
        <div class="modal-notes">${log.notes}</div>
      </div>` : ''}
    `;
    document.getElementById('modal-overlay').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    currentLogDate = null;
  }

  function editLog() {
    if (currentLogDate) window.location.href = `log.html?date=${currentLogDate}`;
  }

  async function deleteLog() {
    if (!currentLogDate) return;
    if (!confirm('Delete this log?')) return;
    
    try {
      const { error } = await supabase.from('logs').delete().eq('date', currentLogDate);
      if (error) throw error;
      await populateMonthFilter();
      closeModal();
    } catch (err) {
      alert('Error deleting log.');
    }
  }

  populateMonthFilter();

  // Pre-fill edit
  const urlParams = new URLSearchParams(window.location.search);
</script>
</body>
</html>
