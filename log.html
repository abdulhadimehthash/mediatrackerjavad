<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Tasks — Media Tracker</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav>
  <span class="nav-brand">MEDIA<span class="dot">.</span>TRACKER</span>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="log.html" class="active">Today's Tasks</a>
    <a href="ig_posts.html">IG Posts</a>
    <a href="followers.html">Followers</a>
    <a href="history.html">History</a>
    <a href="report.html">Report</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Today's Tasks<span class="cursor">_</span></h1>
    <p class="sub" id="log-date-label"></p>
  </div>

  <div class="form-container">
    <div class="form-section">
      <label class="form-label">Date</label>
      <input type="date" id="log-date" class="form-input" />
    </div>

    <div class="form-section">
      <label class="form-label">Today's Tasks</label>
      <p class="form-hint">Add each task on a new line or one by one</p>
      <div id="tasks-container">
        <div class="task-row">
          <input type="text" class="form-input task-input" placeholder="e.g. shot mentor training reel" />
          <button type="button" class="remove-task" onclick="removeTask(this)">×</button>
        </div>
      </div>
      <button type="button" class="btn-ghost" onclick="addTask()">+ Add Task</button>
    </div>



    <div class="form-section">
      <label class="form-label">Notes <span class="optional">(optional)</span></label>
      <textarea class="form-input form-textarea" id="log-notes" placeholder="Anything extra — what went well, what didn't, ideas..."></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="submitLog()">Save Log</button>
      <a href="index.html" class="btn-ghost">Cancel</a>
    </div>

    <div id="save-msg" class="save-msg hidden">✓ Log saved!</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('log-date').value = today;
  document.getElementById('log-date-label').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function addTask() {
    const container = document.getElementById('tasks-container');
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `<input type="text" class="form-input task-input" placeholder="Add a task..." /><button type="button" class="remove-task" onclick="removeTask(this)">×</button>`;
    container.appendChild(row);
    row.querySelector('input').focus();
  }

  function removeTask(btn) {
    const rows = document.querySelectorAll('.task-row');
    if (rows.length > 1) btn.parentElement.remove();
  }

  async function submitLog() {
    const date = document.getElementById('log-date').value;
    if (!date) return alert('Please select a date.');

    const tasks = [...document.querySelectorAll('.task-input')].map(i => i.value.trim()).filter(Boolean);
    const notes = document.getElementById('log-notes').value.trim();

    if (tasks.length === 0) return alert('Please enter at least one task.');

    try {
      let pendingData = JSON.parse(localStorage.getItem('pending_log') || 'null');
      if (pendingData && pendingData.date === date) {
         pendingData.tasks.push(...tasks);
         if (notes) pendingData.notes = (pendingData.notes + "\\n" + notes).trim();
      } else {
         pendingData = { date, tasks, notes };
      }
      localStorage.setItem('pending_log', JSON.stringify(pendingData));
      
      const msg = document.getElementById('save-msg');
      msg.textContent = "✓ Tasks saved! Go to Verify Tasks.";
      msg.classList.remove('hidden');
      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    } catch (err) {
      alert('Error saving log. Please try again.');
    }
  }
</script>
</body>
</html>
